name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
          STANDARD_USER: ${{ secrets.STANDARD_USER }}
          LOCKED_OUT_USER: ${{ secrets.LOCKED_OUT_USER }}
          PROBLEM_USER: ${{ secrets.PROBLEM_USER }}
          PERFORMANCE_GLITCH_USER: ${{ secrets.PERFORMANCE_GLITCH_USER }}
          ERROR_USER: ${{ secrets.ERROR_USER }}
          PERF_GLITCH_TIMEOUT: 60000
        run: npm test

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
